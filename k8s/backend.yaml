apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  POSTGRES_HOST: "db"
  POSTGRES_USER: "postgres"
  POSTGRES_DB: "askmydocs"
  ELASTICSEARCH_HOST: "http://elasticsearch:9200"
  REDIS_HOST: "redis"
  EMBEDDING_PROVIDER: "ollama"
  EMBEDDING_MODEL: "nomic-embed-text"
  OLLAMA_URL: "http://ollama-service:11434"
  LLM_MODEL: "llama3"
  USE_RERANKER: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
type: Opaque
data:
  # Base64 encoded values:
  # "postgres" -> cG9zdGdyZXM=
  # "SUPER_SECRET_KEY_JWT" -> U1VQRVJfU0VDUkVUX0tFWV9KV1Q=
  POSTGRES_PASSWORD: cG9zdGdyZXM=
  JWT_SECRET: U1VQRVJfU0VDUkVUX0tFWV9KV1Q=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: askmydocs-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: backend
