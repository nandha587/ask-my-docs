global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'askmydocs-backend'
    scrape_interval: 5s
    static_configs:
      # In docker-compose, this target maps to backend container name
      - targets: ['backend:8000']
