name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Pytest Tests
        env:
          JWT_SECRET: TEST_SECRET_KEY
          POSTGRES_DB: askmydocs_test
        run: |
          pytest backend/tests/

  build-containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Backend Container Check
        run: docker build -t askmydocs-backend:test backend/

      - name: Build Frontend Container Check
        run: docker build -t askmydocs-frontend:test frontend/
